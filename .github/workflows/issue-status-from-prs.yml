name: Issue Status From Pull Requests

on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize, ready_for_review, closed]
    branches: [main]

concurrency:
  group: issue-status-from-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  update-linked-issues:
    name: Update linked issue status
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Label linked issues
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const labels = {
              'in-pr': { color: '1d76db', description: 'Has an open pull request targeting main' },
            };
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;

            function linkedIssueNumbers(body) {
              const numbers = new Set();
              const closingLines = String(body || '').match(/\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)(?:[^.\n]*)/gi) || [];
              for (const line of closingLines) {
                const references = line.matchAll(/(?:(?<owner>[\w.-]+)\/(?<repo>[\w.-]+))?#(?<number>\d+)/g);
                for (const reference of references) {
                  const targetOwner = reference.groups.owner;
                  const targetRepo = reference.groups.repo;
                  if (targetOwner && (targetOwner.toLowerCase() !== owner.toLowerCase() || targetRepo.toLowerCase() !== repo.toLowerCase())) continue;
                  numbers.add(Number(reference.groups.number));
                }
              }
              return [...numbers];
            }

            async function ensureLabel(name) {
              const opts = { owner, repo };
              try {
                await github.rest.issues.createLabel({ ...opts, name, ...labels[name] });
              } catch (error) {
                if (error.status === 422) {
                  await github.rest.issues.updateLabel({ ...opts, name, ...labels[name] });
                  return;
                }
                throw error;
              }
            }

            async function addLabel(issueNumber, name) {
              await ensureLabel(name);
              await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: [name] });
            }

            async function removeLabel(issueNumber, name) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }

            async function openMainPrIssues() {
              const pulls = await github.paginate(github.rest.pulls.list, { owner, repo, state: 'open', base: 'main', per_page: 100 });
              return new Set(pulls.flatMap((pull) => linkedIssueNumbers(pull.body)));
            }

            for (const issueNumber of linkedIssueNumbers(pr.body)) {
              const issue = await github.rest.issues.get({ owner, repo, issue_number: issueNumber }).catch(() => null);
              if (!issue || issue.data.pull_request) continue;
              if (pr.state === 'closed') {
                const active = await openMainPrIssues();
                if (!active.has(issueNumber)) await removeLabel(issueNumber, 'in-pr');
              } else if (issue.data.state === 'open') {
                await addLabel(issueNumber, 'in-pr');
              }
            }

            await ensureLabel('in-pr');
            const active = await openMainPrIssues();
            const labeled = await github.paginate(github.rest.issues.listForRepo, { owner, repo, state: 'all', labels: 'in-pr', per_page: 100 });
            for (const issue of labeled) {
              if (!issue.pull_request && !active.has(issue.number)) await removeLabel(issue.number, 'in-pr');
            }
