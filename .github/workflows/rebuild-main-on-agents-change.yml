name: Rebuild Main Catalog

on:
  push:
    branches:
      - agents
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rebuild-main-catalog
  cancel-in-progress: false

jobs:
  rebuild-main:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main merge tooling
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch input branches
        run: |
          git fetch origin upstream-marinara:refs/remotes/origin/upstream-marinara
          git fetch origin agents:refs/remotes/origin/agents
          git fetch origin packages:refs/remotes/origin/packages

      - name: Rebuild main from inputs
        env:
          UPSTREAM_BRANCH: origin/upstream-marinara
          AGENTS_BRANCH: origin/agents
          PACKAGES_BRANCH: origin/packages
          OUTPUT_BRANCH: main
          CATALOG_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/rebuild-main-catalog.mjs

      - name: Publish generated main
        run: |
          git status --short
          if git diff --quiet && git diff --cached --quiet; then
            echo "No generated catalog changes."
          else
            git add -A
            git commit -m "Rebuild merged Marinara catalog"
            git push origin HEAD:main
          fi

