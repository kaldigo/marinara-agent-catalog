name: Pull Request Checks

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: agent-catalog-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  catalog-validate:
    name: Catalog validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Test catalog lane routing and build provenance
        run: node scripts/test-catalog-lanes.mjs

      - name: Validate catalogs, packages, artifacts, and README coverage
        run: node scripts/validate-catalog.mjs

      - name: Check whitespace
        env:
          BASE_REF: ${{ github.base_ref }}
        run: git diff --check "origin/${BASE_REF}...HEAD"
