# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false
reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  path_filters:
    - "!artifacts/**"
    - "!packages/**/agents.json"
    - "!packages/**/client.js"
    - "!packages/**/server.mjs"
    - "!sources/engine/**"
  path_instructions:
    - path: "packages/**/manifest.json"
      instructions: "Verify Engine compatibility, permissions, entrypoints, restart requirements, declared files, hashes, sizes, and package/category identity."
    - path: "scripts/**"
      instructions: "Treat package construction, archive paths, catalog integrity, checksums, and generated payload handling as security-sensitive."
    - path: "catalog/catalog.json"
      instructions: "Verify catalog entries match package manifests and artifacts, and that published raw URLs target the main branch."
  auto_review:
    enabled: true
    drafts: false
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 0
    base_branches:
      - "main"
chat:
  auto_reply: true
